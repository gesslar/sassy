config:
  $schema: vscode://schemas/color-theme
  name: Lint Semantic Clean Test
  type: dark
  custom:
    semanticHighlighting: true
theme:
  colors:
    "editor.background": "#1a1a1a"
  semanticTokenColors:
    "variable.declaration":
      foreground: "#e6e6e6"
      fontStyle: "italic"
    "function.declaration":
      foreground: "#4a9eff"
      fontStyle: "bold"
    "keyword": "#ff6b6b"
